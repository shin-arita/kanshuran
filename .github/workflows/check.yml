name: check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  compose-config:
    name: docker compose config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker compose
        run: docker compose config --quiet

  api:
    name: api (vet / lint / test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
      - name: go mod download
        working-directory: api
        run: go mod download
      - name: go vet
        working-directory: api
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          working-directory: api
          version: v2.11.4
      - name: go test
        working-directory: api
        run: go test ./...

  frontend:
    name: frontend (lint / test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # npm install を使用する理由:
      # 開発機が macOS ARM64 のため package-lock.json に
      # linux-x64 用 Rollup optional package が含まれない。
      # npm ci はロックにないパッケージをインストールできないため
      # CI (Linux x64) では npm install が必要。
      - name: npm install
        working-directory: frontend
        run: npm install
      - name: lint
        working-directory: frontend
        run: npm run lint
      - name: test
        working-directory: frontend
        run: npm run test
