services:
  frontend:
    image: kanshuran-frontend:1.0.0
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kanshuran-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      TZ: ${TZ:-Asia/Tokyo}
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    depends_on:
      api:
        condition: service_started
    command: sh -c "npm install && npm run dev"

  api:
    image: kanshuran-api:1.0.0
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: kanshuran-api
    working_dir: /app
    volumes:
      - ./api:/app
      - ./db:/db
      - ./storage:/app/storage
      - go_pkg_mod:/go/pkg/mod
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      TZ: ${TZ:-Asia/Tokyo}
      APP_ENV: ${APP_ENV:-local}
      API_PORT: 8080
      DATABASE_URL: ${DATABASE_URL:-postgres://kanshuran:kanshuran_password@db:5432/kanshuran?sslmode=disable}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-http://localhost:5173}
      LOCAL_STORAGE_ROOT: ${LOCAL_STORAGE_ROOT:-/app/storage}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "go mod download && air -c .air.toml"

  db:
    image: groonga/pgroonga:3.2.5-alpine-16
    container_name: kanshuran-db
    ports:
      - "${DB_PUBLISH_PORT:-5432}:5432"
    environment:
      TZ: ${TZ:-Asia/Tokyo}
      POSTGRES_DB: ${POSTGRES_DB:-kanshuran}
      POSTGRES_USER: ${POSTGRES_USER:-kanshuran}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kanshuran_password}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kanshuran} -d ${POSTGRES_DB:-kanshuran}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: kanshuran-redis
    ports:
      - "${REDIS_PUBLISH_PORT:-6379}:6379"
    environment:
      TZ: ${TZ:-Asia/Tokyo}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
  go_pkg_mod:
  frontend_node_modules:
